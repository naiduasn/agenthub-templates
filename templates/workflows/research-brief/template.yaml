kind: workflow
id: research-brief
name: Research Brief
version: 1.0.0
runtimeName: research-brief
trigger: Manual - research question
status: published
category: Research
description: Plan research, gather source evidence, and synthesize a cited brief with confidence notes.
requiredSkills:
  - source-backed-research
  - workflow-approvals
requiredConnections:
  - slot: web
    label: Web research provider
    capabilities:
      - web.search
      - web.page.read
      - web.source.cite
  - slot: knowledge-base
    label: Document knowledge base
    capabilities:
      - documents.search
      - documents.read
stages:
  - type: agent
    agent: Research Librarian
    template: Research
    role: Draft research plan and source policy
    status: queued
  - type: approval
    label: Research plan approval
    detail: Confirm source scope, recency, and output format before long-running retrieval
    conn: on approve
  - type: agent
    agent: Research Librarian
    template: Evidence synthesis
    role: Gather sources, compare claims, and write cited brief
    status: idle
